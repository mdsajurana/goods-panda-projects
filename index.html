<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Projects Design</title>
    <link rel="stylesheet" href="styles/css.css">
</head>
<body class="body-width">
    <header>
        <nav>
            <div class="navbar display-flex">
                <img src="images/logo.png" alt="">
                <img src="images/menu-bar.png" alt="">
            </div>
        </nav>
        <div class="display-flex banner">
            <div class="header-bar">
                <h2 class="menu-bar-title work-sans-font">Mi LED TV 4A PRO 32</h2>
                <p class="menu-bar-description dark-1 inter-font">
                    Amet minim mollit non deserunt ullamco est sit aliqua dolor do amet sint. Velit officia consequat duis enim velit mollit. Exercitation veniam consequat sunt nostrud amet.
                </p>
                <h3 class="price work-sans-font">$1289</h3>
                <button id="btn-margin" class="btn-prymary inter-font">BUY NOW</button>
            </div>
            <div>
                <img class="banner-img" src="images/hero-tv.png" alt="">
            </div>
        </div>
    </header>
    <main>
        <section class="categories-section">
            <div class="categories display-flex">
                <div id="color-1" class="category-banner display-flex">
                    <h3 class="categary-title work-sans-font">Watch</h3>
                    <img class="category-img" src="images/category-watch.png" alt="">
                </div>
                <div id="color-2" class="category-banner display-flex">
                    <h3 class="categary-title work-sans-font">Bag</h3>
                    <img src="images/category-bag.png" alt="">
                </div>
                <div id="color-3" class="category-banner display-flex">
                    <h3 class="categary-title work-sans-font">Shoes</h3>
                    <img src="images/category-shoe.png" alt="">
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
